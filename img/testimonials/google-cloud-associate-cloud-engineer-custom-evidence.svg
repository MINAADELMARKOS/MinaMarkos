  <text x="145" y="962" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#64748B">CERTIFIED AS</text>
  <text x="145" y="994" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="800" fill="#0F172A">Mina Markos</text>

  <text x="540" y="962" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#64748B">SERIES ID</text>
  <text x="540" y="994" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="800" fill="#0F172A">197135</text>

  <text x="935" y="962" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#64748B">CERTIFICATION ID</text>
  <text x="935" y="989" text-anchor="end" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" fill="#0F172A">
    <tspan x="935" dy="0">0b2929effd86414bb</tspan>
    <tspan x="935" dy="22">42b0f172c3e132a</tspan>
  </text>

  <!-- Footer disclaimer -->
  <text x="540" y="1038" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="500" fill="#94A3B8">Custom evidence card — not an official certificate. Verify credential details with the issuer.</text>
</svg>
