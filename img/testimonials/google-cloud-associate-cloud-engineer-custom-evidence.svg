    <rect x="117" y="842" width="186" height="44" rx="22" fill="#F1F5F9" stroke="#E2E8F0"/>
    <text x="210" y="871" text-anchor="middle">Compute Engine</text>
    <rect x="319" y="842" width="92" height="44" rx="22" fill="#F1F5F9" stroke="#E2E8F0"/>
    <text x="365" y="871" text-anchor="middle">GKE</text>
    <rect x="427" y="842" width="102" height="44" rx="22" fill="#F1F5F9" stroke="#E2E8F0"/>
