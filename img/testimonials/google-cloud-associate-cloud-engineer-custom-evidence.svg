<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">Google Cloud Associate Cloud Engineer Certification Custom Evidence Card</title>
  <desc id="desc">Custom evidence card for Mina Markos, Google Cloud Associate Cloud Engineer Certification, Certification ID 0b2929effd86414bb42b0f172c3e132a.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F8FBFF"/>
      <stop offset="55%" stop-color="#EEF4FF"/>
      <stop offset="100%" stop-color="#F7FAFC"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A73E8"/>
      <stop offset="100%" stop-color="#185ABC"/>
    </linearGradient>
    <linearGradient id="softBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F0FE"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" rx="74" fill="url(#panel)"/>
  <rect x="66" y="66" width="948" height="948" rx="58" fill="#FFFFFF" stroke="#DDE7F5" stroke-width="6" filter="url(#shadow)"/>

  <!-- Top metadata pills -->
  <rect x="112" y="122" width="210" height="54" rx="27" fill="#E8F0FE"/>
  <text x="217" y="157" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#1A73E8">Certification</text>

  <rect x="342" y="122" width="190" height="54" rx="27" fill="#E6F4EA"/>
  <text x="437" y="157" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#188038">Intermediate</text>

  <rect x="552" y="122" width="216" height="54" rx="27" fill="#FEF7E0"/>
  <text x="660" y="157" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#B06000">Recommended</text>

  <rect x="788" y="122" width="180" height="54" rx="27" fill="#FCE8E6"/>
  <text x="878" y="157" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#C5221F">Custom Evidence</text>

  <!-- Icon panel -->
  <rect x="332" y="222" width="416" height="258" rx="58" fill="url(#softBlue)" stroke="#D7E3FC" stroke-width="4"/>
  <rect x="382" y="272" width="316" height="158" rx="36" fill="url(#blueGrad)"/>

  <!-- Generic cloud / platform icon with Google-inspired accents -->
  <path d="M468 382h142c38 0 68-28 68-64 0-33-25-61-58-64-15-38-52-63-94-63-50 0-91 35-101 82-32 6-56 31-56 61 0 27 22 48 49 48h50z" fill="#FFFFFF" opacity="0.97"/>
  <circle cx="456" cy="342" r="12" fill="#34A853"/>
  <circle cx="626" cy="342" r="12" fill="#FBBC04"/>
  <circle cx="541" cy="297" r="12" fill="#EA4335"/>
  <path d="M467 342h149M541 309v62" stroke="#1A73E8" stroke-width="12" stroke-linecap="round" opacity="0.95"/>
  <circle cx="456" cy="342" r="5" fill="#FFFFFF"/>
  <circle cx="626" cy="342" r="5" fill="#FFFFFF"/>
  <circle cx="541" cy="297" r="5" fill="#FFFFFF"/>

